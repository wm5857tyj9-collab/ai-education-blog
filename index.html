<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 赋能教育 · 个人博客</title>
    <meta
      name="description"
      content="围绕 AI 赋能教育的个人博客，涵盖文章列表、详情、标签分类与简单后台。"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="#/home" aria-label="返回首页">
          <span class="brand-mark">AI</span>
          <span class="brand-text">
            <strong>AI 赋能教育</strong>
            <small>独立文章文件 + Git 后台</small>
          </span>
        </a>

        <nav class="nav" aria-label="主导航">
          <a href="#/home">首页</a>
          <a href="#/tags">标签</a>
          <a href="#/about">关于</a>
          <a href="./admin/">后台</a>
        </nav>

        <label class="search" for="global-search">
          <span>搜索</span>
          <input
            id="global-search"
            type="search"
            placeholder="查找标题、标签、摘要..."
            autocomplete="off"
            spellcheck="false"
          />
        </label>
      </header>

      <main id="app" class="app-main" aria-live="polite"></main>

      <footer class="footer">
        <span>文章按 JSON 文件独立存放，适合通过 Git 自动部署。</span>
        <a href="./admin/">进入后台</a>
      </footer>
    </div>
  </body>
</html>
